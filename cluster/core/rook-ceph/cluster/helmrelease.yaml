---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 10m
  chart:
    spec:
      # renovate: registryUrl=https://charts.rook.io/release
      chart: rook-ceph-cluster
      version: v1.8.2
      sourceRef:
        kind: HelmRepository
        name: rook-ceph-charts
        namespace: flux-system
  dependsOn:
    - name: rook-ceph
  values:
    monitoring:
      enabled: true
    ingress:
      dashboard:
        annotations:
          kubernetes.io/ingress.class: nginx
        host:
          name: rook.${DOMAIN}
          path: /
        tls:
          - hosts:
              - rook.${DOMAIN}
    cephClusterSpec:
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
      storage:
        nodes:
          - name: k8s-1
            devices:
              - name: "/dev/disk/by-uuid/169F-841E"
        useAllDevices: false
        useAllNodes: false
    cephFileSystems: []
    cephObjectStores: []
